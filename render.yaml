services:
  - type: web
    name: podcast-intelligence-inbox
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_MODE
        value: "true"
      - key: PODCAST_LIBRARY_SNAPSHOT
        value: data/public/podcast_library_snapshot.json
